name: Weekly Snapshot

on:
  schedule:
    - cron: '0 0 * * 0'   # Every Sunday at 00:00 UTC
  workflow_dispatch:        # Also triggerable manually from the Actions tab

permissions:
  contents: write           # Needed to commit & push snapshot files

jobs:
  snapshot:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build

      - name: Start production server
        run: |
          npm start &
          echo "SERVER_PID=$!" >> "$GITHUB_ENV"
          # Wait for port 3000 to be accepting connections
          npx --yes wait-on tcp:3000 --timeout 30000

      - name: Save snapshot
        run: node scripts/save-snapshot.mjs

      - name: Stop server
        if: always()
        run: kill "$SERVER_PID" 2>/dev/null || true

      - name: Commit and push snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add snapshots/
          git diff --staged --quiet \
            && echo "Snapshot unchanged – nothing to commit" \
            && exit 0
          git commit -m "chore: weekly snapshot ($(date -u '+%a, %b %d %Y'))"
          git push
